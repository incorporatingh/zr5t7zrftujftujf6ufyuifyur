name: Run Automation

on:
  schedule:
    - cron: '*/5 * * * *'

  workflow_dispatch:

env:
  DISPLAY_NUM: "99"
  DISPLAY: ":99"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Install system packages ────────────────────
      - name: Block Snap Firefox + add Mozilla repo
        run: |
          sudo tee /etc/apt/preferences.d/block-firefox-snap > /dev/null << 'PIN'
          Package: firefox*
          Pin: release o=Ubuntu
          Pin-Priority: -1
          PIN

          sudo tee /etc/apt/preferences.d/mozilla > /dev/null << 'PIN'
          Package: firefox*
          Pin: origin packages.mozilla.org
          Pin-Priority: 1001
          PIN

          sudo install -d -m 0755 /etc/apt/keyrings
          wget -qO- https://packages.mozilla.org/apt/repo-signing-key.gpg \
            | sudo tee /etc/apt/keyrings/packages.mozilla.org.asc > /dev/null

          echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] \
            https://packages.mozilla.org/apt mozilla main" \
            | sudo tee /etc/apt/sources.list.d/mozilla.list > /dev/null

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3-pip python3-tk python3-dev python3-venv \
            xvfb x11-xserver-utils x11-utils xauth dbus-x11 \
            xfce4 xfce4-goodies openbox \
            wmctrl xclip scrot xdotool \
            x11vnc novnc python3-websockify \
            firefox \
            procps

      # ── 2. Restore camoufox cache ─────────────────────
      - name: Restore camoufox binary cache
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: |
            ~/.camoufox
            ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-${{ hashFiles('_private/scripts/requirements-refs.txt') }}

      # ── 3. Fetch private scripts ──────────────────────
      - name: Fetch private scripts
        uses: actions/checkout@v4
        with:
          repository: incorporatingh/turing
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      # ── 4. Install Python packages (with pip cache) ───
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('_private/scripts/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          pip3 install --break-system-packages -r _private/scripts/requirements.txt

      # ── 5. Pre-fetch camoufox binary (skip if cached) ─
      - name: Fetch camoufox browser binary
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: python3 -m camoufox fetch

      # ── 6. Start display environment ──────────────────
      - name: Start headless display
        run: |
          # Clean stale locks
          rm -f /tmp/.X99-lock /tmp/.X11-unix/X99

          # Start Xvfb
          Xvfb :99 -screen 0 1920x1080x24 +extension RANDR &

          # Wait for the X socket to appear
          for i in $(seq 1 20); do
            if [ -S /tmp/.X11-unix/X99 ]; then
              echo "Xvfb ready (socket found)"
              break
            fi
            [ "$i" -eq 20 ] && { echo "Xvfb failed to create socket"; exit 1; }
            sleep 1
          done

          sleep 2

          # Start XFCE desktop
          dbus-launch --exit-with-session startxfce4 &

          # Wait for window manager
          for i in $(seq 1 30); do
            if pgrep -x xfwm4 &>/dev/null; then
              echo "Window manager ready"
              break
            fi
            [ "$i" -eq 30 ] && echo "WARNING: xfwm4 not detected"
            sleep 1
          done

          # Start VNC (for debugging)
          x11vnc -display :99 -forever -shared -nopw \
            -rfbport 5900 > /tmp/x11vnc.log 2>&1 &
          websockify --web=/usr/share/novnc/ 6080 127.0.0.1:5900 \
            > /tmp/novnc.log 2>&1 &

          sleep 2

          # Verify
          echo "X server test:"
          xdpyinfo -display :99 2>&1 | head -3
          echo "Display environment ready"
          
      # ── 7. Verify everything ──────────────────────────
      - name: Verify environment
        run: |
          echo "DISPLAY=$DISPLAY"
          echo "--- Firefox ---"
          firefox --version
          echo "--- camoufox ---"
          ls -lh ~/.camoufox/ 2>/dev/null || echo "No cache dir"
          python3 -c "from camoufox.sync_api import Camoufox; print('import OK')" 2>&1
          echo "--- pyautogui ---"
          python3 -c "import pyautogui; print('import OK')" 2>&1
          echo "--- processes ---"
          ps aux | grep -E 'Xvfb|xfwm4|x11vnc' | grep -v grep

      # ── 8. Run both scripts ───────────────────────────
      - name: Run automation
        working-directory: _private/scripts
        run: |
          python3 tempmail_bot.py &
          TEMPMAIL_PID=$!

          python3 reddit_script_2.py
          SCRIPT_EXIT=$?

          kill $TEMPMAIL_PID 2>/dev/null || true
          wait $TEMPMAIL_PID 2>/dev/null

          exit $SCRIPT_EXIT

      # ── 9. Screenshot for debugging ───────────────────
      - name: Capture screenshot
        if: always()
        run: scrot /tmp/final-state.png 2>/dev/null || true

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-screenshot
          path: /tmp/final-state.png
          if-no-files-found: ignore
          retention-days: 7
