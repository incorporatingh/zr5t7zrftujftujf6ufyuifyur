name: Process

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: incorporatingh/turing
          token: ${{ secrets.T }}
          path: .w

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: p-${{ hashFiles('.w/scripts/requirements.txt') }}
          restore-keys: p-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.camoufox
            ~/.cache/camoufox
          key: b-${{ hashFiles('.w/.run/setup.sh') }}
          restore-keys: b-

      - run: sudo -E bash .w/.run/setup.sh

      - run: bash .w/.run/execute.sh
        env:
          S: ${{ secrets.S }}
